<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .game-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        #gameCanvas {
            border: 3px solid #fbbf24;
            border-radius: 12px;
            background: #1f2937;
        }
        .score-display {
            background: linear-gradient(45deg, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .game-over {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="game-container p-8 max-w-4xl w-full">
        <div class="text-center mb-6">
            <h1 class="text-4xl font-bold text-gray-800 mb-2">贪吃蛇游戏</h1>
            <div class="flex justify-center items-center space-x-8">
                <div class="score-display text-2xl font-bold">得分: <span id="score">0</span></div>
                <div class="text-lg text-gray-600">最高分: <span id="highScore">0</span></div>
            </div>
        </div>
        
        <div class="flex justify-center mb-6">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </div>
        
        <div class="text-center space-y-4">
            <div class="text-gray-600">
                <p class="mb-2">使用方向键或WASD控制蛇的移动</p>
                <p class="text-sm">吃到红色食物得分，避免撞墙和咬到自己</p>
            </div>
            
            <div class="flex justify-center space-x-4">
                <button id="startBtn" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-lg font-semibold transition-colors">
                    开始游戏
                </button>
                <button id="pauseBtn" class="bg-yellow-500 hover:bg-yellow-600 text-white px-6 py-3 rounded-lg font-semibold transition-colors">
                    暂停
                </button>
                <button id="resetBtn" class="bg-red-500 hover:bg-red-600 text-white px-6 py-3 rounded-lg font-semibold transition-colors">
                    重置
                </button>
            </div>
        </div>
        
        <div id="gameOverScreen" class="game-over fixed inset-0 flex items-center justify-center hidden">
            <div class="bg-white p-8 rounded-xl text-center shadow-2xl">
                <h2 class="text-3xl font-bold text-red-600 mb-4">游戏结束！</h2>
                <p class="text-xl text-gray-700 mb-2">最终得分: <span id="finalScore">0</span></p>
                <p class="text-lg text-gray-600 mb-6">最高分: <span id="finalHighScore">0</span></p>
                <button id="restartBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-8 py-3 rounded-lg font-semibold transition-colors">
                    再玩一次
                </button>
            </div>
        </div>
    </div>

    <script>
        class SnakeGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.cellSize = 20;
                this.width = 30;
                this.height = 30;
                this.snake = [{x: 10, y: 10}];
                this.direction = {x: 1, y: 0};
                this.food = this.generateFood();
                this.score = 0;
                this.highScore = localStorage.getItem('snakeHighScore') || 0;
                this.gameRunning = false;
                this.gamePaused = false;
                this.gameLoop = null;
                
                this.setupEventListeners();
                this.updateDisplay();
                this.draw();
            }
            
            setupEventListeners() {
                document.getElementById('startBtn').addEventListener('click', () => this.startGame());
                document.getElementById('pauseBtn').addEventListener('click', () => this.pauseGame());
                document.getElementById('resetBtn').addEventListener('click', () => this.resetGame());
                document.getElementById('restartBtn').addEventListener('click', () => this.restartGame());
                
                document.addEventListener('keydown', (e) => this.handleKeyPress(e));
            }
            
            handleKeyPress(e) {
                if (!this.gameRunning || this.gamePaused) return;
                
                switch(e.key) {
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        if (this.direction.y === 0) {
                            this.direction = {x: 0, y: -1};
                        }
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        if (this.direction.y === 0) {
                            this.direction = {x: 0, y: 1};
                        }
                        break;
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        if (this.direction.x === 0) {
                            this.direction = {x: -1, y: 0};
                        }
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        if (this.direction.x === 0) {
                            this.direction = {x: 1, y: 0};
                        }
                        break;
                }
            }
            
            generateFood() {
                let newFood;
                do {
                    newFood = {
                        x: Math.floor(Math.random() * this.width),
                        y: Math.floor(Math.random() * this.height)
                    };
                } while (this.snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));
                
                return newFood;
            }
            
            startGame() {
                if (!this.gameRunning) {
                    this.gameRunning = true;
                    this.gamePaused = false;
                    this.gameLoop = setInterval(() => this.update(), 150);
                    document.getElementById('startBtn').textContent = '游戏中...';
                }
            }
            
            pauseGame() {
                if (this.gameRunning && !this.gamePaused) {
                    this.gamePaused = true;
                    clearInterval(this.gameLoop);
                    document.getElementById('pauseBtn').textContent = '继续';
                } else if (this.gameRunning && this.gamePaused) {
                    this.gamePaused = false;
                    this.gameLoop = setInterval(() => this.update(), 150);
                    document.getElementById('pauseBtn').textContent = '暂停';
                }
            }
            
            resetGame() {
                this.gameRunning = false;
                this.gamePaused = false;
                clearInterval(this.gameLoop);
                this.snake = [{x: 10, y: 10}];
                this.direction = {x: 1, y: 0};
                this.food = this.generateFood();
                this.score = 0;
                document.getElementById('startBtn').textContent = '开始游戏';
                document.getElementById('pauseBtn').textContent = '暂停';
                this.updateDisplay();
                this.draw();
            }
            
            restartGame() {
                document.getElementById('gameOverScreen').classList.add('hidden');
                this.resetGame();
                this.startGame();
            }
            
            update() {
                if (!this.gameRunning || this.gamePaused) return;
                
                // 移动蛇头
                const newHead = {
                    x: this.snake[0].x + this.direction.x,
                    y: this.snake[0].y + this.direction.y
                };
                
                // 检查撞墙
                if (newHead.x < 0 || newHead.x >= this.width || newHead.y < 0 || newHead.y >= this.height) {
                    this.gameOver();
                    return;
                }
                
                // 检查撞到自己
                if (this.snake.some(segment => segment.x === newHead.x && segment.y === newHead.y)) {
                    this.gameOver();
                    return;
                }
                
                this.snake.unshift(newHead);
                
                // 检查吃到食物
                if (newHead.x === this.food.x && newHead.y === this.food.y) {
                    this.score += 10;
                    this.food = this.generateFood();
                    this.updateDisplay();
                } else {
                    this.snake.pop();
                }
                
                this.draw();
            }
            
            gameOver() {
                this.gameRunning = false;
                clearInterval(this.gameLoop);
                
                if (this.score > this.highScore) {
                    this.highScore = this.score;
                    localStorage.setItem('snakeHighScore', this.highScore);
                }
                
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('finalHighScore').textContent = this.highScore;
                document.getElementById('gameOverScreen').classList.remove('hidden');
                
                document.getElementById('startBtn').textContent = '开始游戏';
                document.getElementById('pauseBtn').textContent = '暂停';
            }
            
            updateDisplay() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('highScore').textContent = this.highScore;
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = '#1f2937';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制网格
                this.ctx.strokeStyle = '#374151';
                this.ctx.lineWidth = 1;
                for (let i = 0; i <= this.width; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * this.cellSize, 0);
                    this.ctx.lineTo(i * this.cellSize, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let i = 0; i <= this.height; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * this.cellSize);
                    this.ctx.lineTo(this.canvas.width, i * this.cellSize);
                    this.ctx.stroke();
                }
                
                // 绘制蛇
                this.snake.forEach((segment, index) => {
                    if (index === 0) {
                        // 蛇头
                        this.ctx.fillStyle = '#10b981';
                    } else {
                        // 蛇身
                        this.ctx.fillStyle = '#059669';
                    }
                    this.ctx.fillRect(
                        segment.x * this.cellSize + 1,
                        segment.y * this.cellSize + 1,
                        this.cellSize - 2,
                        this.cellSize - 2
                    );
                });
                
                // 绘制食物
                this.ctx.fillStyle = '#ef4444';
                this.ctx.fillRect(
                    this.food.x * this.cellSize + 1,
                    this.food.y * this.cellSize + 1,
                    this.cellSize - 2,
                    this.cellSize - 2
                );
            }
        }
        
        // 启动游戏
        window.addEventListener('load', () => {
            new SnakeGame();
        });
    </script>
</body>
</html>
